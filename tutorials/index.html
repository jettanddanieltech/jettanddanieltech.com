<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JDT // NEURAL_VAULT_v18</title>
    <style>
        :root { 
            --cyan: #00d2ff; --bg: #000; --panel: #050505; 
            --border: #1a1a1a; --font: 'Courier New', monospace; 
            --glass: rgba(10, 10, 10, 0.9);
        }

        * { box-sizing: border-box; outline: none; transition: 0.2s ease; }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--cyan); }

        body { 
            margin: 0; background: var(--bg); color: #fff; 
            font-family: var(--font); height: 100vh; overflow: hidden; 
            display: flex; flex-direction: column; 
        }

        /* --- TOP SYSTEM NAV --- */
        .top-nav { 
            width: 100%; display: flex; justify-content: center; gap: 25px; 
            padding: 20px; border-bottom: 1px solid var(--border); 
            background: var(--glass); backdrop-filter: blur(20px); z-index: 1000; 
        }
        .nav-link { 
            color: #444; text-decoration: none; font-size: 0.7rem; 
            letter-spacing: 4px; font-weight: bold; 
        }
        .nav-link:hover, .nav-active { color: var(--cyan); text-shadow: 0 0 10px var(--cyan); }

        /* --- SEARCH SECTION --- */
        .search-area { padding: 40px 10% 20px; text-align: center; }
        #search-input { 
            width: 100%; max-width: 600px; background: #050505; border: 1px solid var(--border);
            padding: 15px 25px; color: var(--cyan); font-family: inherit; border-radius: 2px;
            letter-spacing: 2px;
        }

        /* --- GRID --- */
        #main-grid { 
            flex-grow: 1; overflow-y: auto; padding: 20px 10% 150px; 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; 
        }
        .card { 
            background: #080808; border: 1px solid var(--border); padding: 25px; 
            cursor: pointer; position: relative;
        }
        .card:hover { border-color: var(--cyan); transform: scale(1.02); background: #0c0c0c; }
        .card h3 { font-size: 0.9rem; margin: 10px 0; color: #eee; }
        .card p { font-size: 0.7rem; color: #444; line-height: 1.5; }
        .tag { font-size: 0.5rem; color: var(--cyan); border: 1px solid var(--cyan); padding: 2px 6px; width: fit-content; }

        /* --- BOTTOM FILTER DOCK --- */
        .bottom-dock { 
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 600px; background: var(--glass);
            backdrop-filter: blur(20px); border: 1px solid var(--border);
            border-radius: 5px; display: flex; justify-content: space-around;
            padding: 15px; z-index: 2000;
        }
        .f-btn { background: none; border: none; color: #333; font-family: inherit; font-size: 0.6rem; letter-spacing: 2px; cursor: pointer; }
        .f-btn:hover, .f-active { color: var(--cyan); }

        /* --- MODAL / POPUP --- */
        #modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 3000; display: none;
            flex-direction: column;
        }
        #progress-container { width: 100%; height: 4px; background: #111; position: sticky; top: 0; z-index: 3100; }
        #progress-bar { width: 0%; height: 100%; background: var(--cyan); box-shadow: 0 0 10px var(--cyan); }
        
        .modal-scroll { overflow-y: auto; padding: 60px 15%; height: 100%; }
        .modal-header { margin-bottom: 40px; }
        #m-title { font-size: 2rem; color: var(--cyan); margin: 0; letter-spacing: 3px; }
        
        #m-body { line-height: 2; color: #888; font-size: 1rem; white-space: pre-line; margin-bottom: 40px; }
        
        .btn-group { display: flex; gap: 15px; position: fixed; top: 30px; right: 30px; }
        .action-btn { 
            background: #000; border: 1px solid #222; color: #555; 
            padding: 10px 20px; cursor: pointer; font-family: inherit; font-size: 0.6rem; letter-spacing: 2px;
        }
        .action-btn:hover { border-color: var(--cyan); color: var(--cyan); }

    </style>
</head>
<body>

    <nav class="top-nav">
        <a href="index.html" class="nav-link">HOME</a>
        <a href="ai.html" class="nav-link">TECHY_AI</a>
        <a href="tutorials.html" class="nav-link nav-active">TUTORIALS</a>
        <a href="hardware.html" class="nav-link">HARDWARE</a>
    </nav>

    <div class="search-area">
        <input type="text" id="search-input" placeholder="SEARCH ARCHIVES..." onkeyup="filter()">
    </div>

    <main id="main-grid"></main>

    <nav class="bottom-dock">
        <button class="f-btn f-active" onclick="setCat('ALL', this)">ALL</button>
        <button class="f-btn" onclick="setCat('HARDWARE', this)">HARDWARE</button>
        <button class="f-btn" onclick="setCat('CODE', this)">CODE</button>
        <button class="f-btn" onclick="setCat('MATH', this)">MATH</button>
    </nav>

    <div id="modal">
        <div id="progress-container"><div id="progress-bar"></div></div>
        <div class="btn-group">
            <button class="action-btn" onclick="copyContent()">COPY_CODE</button>
            <button class="action-btn" onclick="closeM()">EXIT_X</button>
        </div>
        <div class="modal-scroll" onscroll="updateProgress(this)">
            <div class="modal-header">
                <div id="m-tag" class="tag"></div>
                <h1 id="m-title"></h1>
            </div>
            <div id="m-body"></div>
        </div>
    </div>

    <script>
        const data = [
            { cat: "CODE", title: "Procedural Terrain JS", desc: "Generating 2D landscapes using Perlin Noise algorithms.", body: "// SNIPPET: Perlin Noise Logic\nfunction generateTerrain(width, height) {\n  let map = [];\n  for(let x=0; x<width; x++) {\n    map[x] = noise(x * 0.01) * height;\n  }\n  return map;\n}\n// End of Logic." },
            { cat: "HARDWARE", title: "Thermal Throttling Fix", desc: "Applying liquid metal to resolve high CPU temps.", body: "1. Clean die with 99% IPA.\n2. Apply nail polish around SMDs for insulation.\n3. Spread a thin layer of Liquid Metal.\n4. Re-seat the heatsink and verify pressure." },
            { cat: "MATH", title: "Mental Algebra: Level 3", desc: "How to solve multi-step equations without a calculator.", body: "Step 1: Group all constants on the right.\nStep 2: Simplify the coefficient.\nStep 3: Perform division in parts (e.g., 144/12).\nStep 4: Confirm via substitution." }
        ];

        // Fill data to 30+ items
        for(let i=0; i<30; i++) {
            data.push({ cat: ["CODE","MATH","HARDWARE"][i%3], title: `Module_Log_${100+i}`, desc: "Systematic data deconstruction log.", body: `LOG_ENTRY_${i}:\nInitializing neural nodes...\nAnalyzing checksums...\nData Integrity: 100%.\nExecute patch 0.4.${i}.` });
        }

        let cat = "ALL";
        const grid = document.getElementById('main-grid');

        function render(items) {
            grid.innerHTML = '';
            items.forEach(item => {
                const el = document.createElement('div');
                el.className = 'card';
                el.innerHTML = `<div class="tag">${item.cat}</div><h3>${item.title}</h3><p>${item.desc}</p>`;
                el.onclick = () => openM(item);
                grid.appendChild(el);
            });
        }

        function setCat(c, btn) {
            cat = c;
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('f-active'));
            btn.classList.add('f-active');
            filter();
        }

        function filter() {
            const q = document.getElementById('search-input').value.toLowerCase();
            const filtered = data.filter(i => (cat === "ALL" || i.cat === cat) && i.title.toLowerCase().includes(q));
            render(filtered);
        }

        function openM(item) {
            document.getElementById('m-title').innerText = item.title;
            document.getElementById('m-tag').innerText = item.cat;
            document.getElementById('m-body').innerText = item.body;
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('progress-bar').style.width = '0%';
        }

        function closeM() { document.getElementById('modal').style.display = 'none'; }

        function updateProgress(el) {
            const winScroll = el.scrollTop;
            const height = el.scrollHeight - el.clientHeight;
            const scrolled = (winScroll / height) * 100;
            document.getElementById("progress-bar").style.width = scrolled + "%";
        }

        function copyContent() {
            const text = document.getElementById('m-body').innerText;
            navigator.clipboard.writeText(text);
            alert("CODE_COPIED_TO_CLIPBOARD");
        }

        window.onload = () => render(data);
    </script>
</body>
</html>
