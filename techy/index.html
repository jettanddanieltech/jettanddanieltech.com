<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE_TECH_INDEX // OMNI_GEN_CORE</title>
    <style>
        :root { --bg: #000; --blue: #33BBFF; --green: #00FF41; --text: #FFF; --dim: #111; --user-bg: #111; --ai-bg: #000a15; }
        body { background: var(--bg); color: var(--blue); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .hud { width: 100%; padding: 12px 25px; border-bottom: 1px solid var(--dim); display: flex; justify-content: space-between; font-size: 10px; color: var(--green); background: #000; letter-spacing: 2px; }
        #chat-flow { flex-grow: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; gap: 30px; scroll-behavior: smooth; }

        .bubble { max-width: 92%; padding: 20px 28px; border-radius: 25px; font-size: 15px; line-height: 1.7; animation: emerge 0.4s cubic-bezier(0,1,0,1); white-space: pre-wrap; position: relative; }
        .user { align-self: flex-end; background: var(--user-bg); color: #fff; border: 1px solid #333; border-bottom-right-radius: 5px; }
        .ai { align-self: flex-start; background: var(--ai-bg); color: var(--blue); border: 1px solid #003366; border-bottom-left-radius: 5px; box-shadow: 0 5px 25px rgba(51, 187, 255, 0.15); }
        .ai b { color: var(--green); display: block; margin-bottom: 10px; font-size: 11px; letter-spacing: 3px; }

        .code-box { background: #050505; color: var(--green); padding: 25px; border-radius: 12px; font-family: 'Consolas', monospace; font-size: 13px; border: 1px solid #1a1a1a; display: block; overflow-x: auto; max-height: 550px; margin-top: 15px; border-left: 4px solid var(--green); }

        .input-area { padding: 45px; background: #000; border-top: 1px solid var(--dim); display: flex; justify-content: center; }
        .input-shield { width: 100%; max-width: 1100px; background: #0a0a0a; border: 1px solid var(--dim); border-radius: 50px; padding: 18px 35px; display: flex; align-items: center; transition: 0.3s; }
        .input-shield:focus-within { border-color: var(--blue); box-shadow: 0 0 20px rgba(51, 187, 255, 0.2); }
        input { width: 100%; background: transparent; border: none; color: #fff; outline: none; font-size: 18px; }

        @keyframes emerge { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="hud"><span>SYSTEM: OMNI_v105</span><span>INTEL: UNRESTRICTED</span><span>STATUS: ONLINE</span></div>

<div id="chat-flow">
    <div class="bubble ai"><b>[GEMINI_ULTRA]</b> Universal Intelligence Layer active. I can now generate full-scale applications, solve complex mathematics, or provide strategic insights on any topic. Query the core.</div>
</div>

<div class="input-area">
    <div class="input-shield">
        <input type="text" id="omni-in" placeholder="Ask anything: 'Write Tetris', 'What is 15*85', or 'Explain Black Holes'..." onkeydown="handle(event)">
    </div>
</div>

<script>
    const flow = document.getElementById('chat-flow');

    function handle(e) {
        if (e.key === 'Enter' && e.target.value.trim() !== "") {
            const input = e.target.value;
            const q = input.toLowerCase().trim();
            flow.innerHTML += `<div class="bubble user">${input}</div>`;
            e.target.value = '';

            setTimeout(() => {
                let res = "";
                
                // 1. FULL APP LOGIC (TETRIS)
                if (q.includes("tetris") && (q.includes("write") || q.includes("code") || q.includes("full"))) {
                    res = "Full Tetris Application generated. Copy this block into an .html file:\n<div class='code-box'>&lt;!DOCTYPE html&gt;\n&lt;html&gt;\n&lt;!-- FULL TETRIS ENGINE --&gt;\n&lt;canvas id='t' width='240' height='400'&gt;&lt;/canvas&gt;\n&lt;script&gt;/* Entire Engine Logic Here */&lt;/script&gt;\n&lt;/html&gt;</div>";
                }
                // 2. MATH ENGINE
                else if (/^[0-9+\-*/().\s]+$/.test(q.replace('what is ', '').replace('=', ''))) {
                    try {
                        let calc = eval(q.replace('what is ', '').replace('=', ''));
                        res = `Calculation finalized. The result is **${calc}**. Logic verified.`;
                    } catch { res = "Mathematical syntax error detected. Please re-input variables."; }
                }
                // 3. UNIVERSAL KNOWLEDGE (THE "ANYTHING" PART)
                else {
                    const brain = [
                        "Analyzing multi-vector request... My internal database suggests this is a high-priority concept for THE_TECH_INDEX. Let's expand on this.",
                        "Data retrieved. From a technical perspective, this aligns with the current neural architecture of our site. Should we document this in the archive?",
                        "That is a complex query. I've processed the variables and I'm ready to provide a deep-dive analysis. What specific detail shall we focus on?",
                        "Calculated. I've indexed your input. This connects to our central technical dictionary. Do you want the full definition or the code implementation?"
                    ];
                    res = brain[Math.floor(Math.random() * brain.length)];
                }

                flow.innerHTML += `<div class="bubble ai"><b>[GEMINI_ULTRA]</b> ${res}</div>`;
                flow.scrollTop = flow.scrollHeight;
            }, 800);
        }
    }
</script>
</body>
</html>
