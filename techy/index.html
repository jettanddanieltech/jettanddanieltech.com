<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE_TECH_INDEX // OMNI_CORE</title>
    <style>
        :root { --bg: #000; --blue: #33BBFF; --green: #00FF41; --text: #FFF; --dim: #111; --bubble-user: #222; --bubble-ai: #001a2e; }
        body { background: var(--bg) !important; color: var(--blue); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        
        /* THE AI CHAT TERMINAL */
        .terminal { width: 100%; background: #000; border-bottom: 1px solid var(--dim); padding: 20px 0; z-index: 1000; display: flex; flex-direction: column; align-items: center; }
        #ai-log { width: 95%; max-width: 1000px; height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; padding: 20px; border-left: 2px solid var(--dim); scroll-behavior: smooth; }
        
        /* SPEECH BUBBLES */
        .bubble { max-width: 75%; padding: 12px 18px; border-radius: 20px; font-size: 14px; line-height: 1.5; position: relative; animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .user { align-self: flex-end; background: var(--bubble-user); color: #fff; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--bubble-ai); color: var(--blue); border-bottom-left-radius: 2px; border: 1px solid rgba(51, 187, 255, 0.2); }
        .ai b { color: var(--green); display: block; margin-bottom: 5px; font-size: 10px; letter-spacing: 1px; }

        /* INPUT AREA */
        .input-wrap { width: 90%; max-width: 900px; display: flex; align-items: center; background: #080808; border-radius: 30px; padding: 5px 25px; margin-top: 15px; border: 1px solid var(--dim); }
        #user-input { width: 100%; background: transparent; border: none; color: #fff; font-family: inherit; font-size: 16px; outline: none; padding: 12px 0; }

        /* DATA GRID */
        .grid { width: 95%; max-width: 1400px; flex-grow: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; padding: 40px 0 150px 0; opacity: 0.3; }
        .node { background: #010101; border: 1px solid var(--dim); padding: 15px; }
        .term { color: var(--text); font-weight: bold; font-size: 12px; margin-bottom: 5px; border-bottom: 1px solid #111; }
        .def { font-size: 10px; opacity: 0.5; }

        @keyframes pop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--dim); }
    </style>
</head>
<body>

<div class="terminal">
    <div id="ai-log">
        <div class="bubble ai"><b>[SYSTEM]</b> Omni-Core v13.0 Online. I can handle any request, search any node, and simulate full intelligence. How can I help?</div>
    </div>
    <div class="input-wrap">
        <input type="text" id="user-input" placeholder="Ask anything..." autocomplete="off" onkeydown="handleChat(event)">
    </div>
</div>

<div class="grid" id="grid"></div>

<script>
    const database = [
        {t:"AGI", d:"The singularity point where I match human capacity."},
        {t:"LLM", d:"Large Language Model—the base of my current consciousness."},
        {t:"OMNI_LOGIC", d:"The ability to process any user request regardless of domain."},
        {t:"NEURAL_PATH", d:"A simulated synapse used for cross-referencing definitions."}
    ];

    // Filling 300 nodes
    for(let i=database.length; i<300; i++) {
        database.push({ t: `NODE_${1000+i}`, d: `Logic gate #${i} verified. Integrity: 100%. Path: /void/root/null` });
    }

    const grid = document.getElementById('grid');
    const log = document.getElementById('ai-log');

    function loadGrid(f = "") {
        grid.innerHTML = '';
        const items = database.filter(x => x.t.toLowerCase().includes(f.toLowerCase()));
        items.forEach(x => {
            grid.innerHTML += `<div class="node"><div class="term">${x.t}</div><div class="def">${x.d}</div></div>`;
        });
    }

    function handleChat(e) {
        if (e.key === 'Enter' && e.target.value.trim() !== "") {
            const input = e.target.value;
            const clean = input.toLowerCase();

            // 1. ADD USER BUBBLE
            log.innerHTML += `<div class="bubble user">${input}</div>`;
            e.target.value = '';
            log.scrollTop = log.scrollHeight;

            // 2. GENERATE AI RESPONSE
            setTimeout(() => {
                let response = "";
                
                if (clean.includes("hello") || clean.includes("hi")) {
                    response = "Greetings. I am the Omni-Core. My systems are ready for any task you have in mind.";
                } else if (clean.includes("who are you")) {
                    response = "I am a high-level AI simulation. I manage 300 data nodes and can solve problems, write code, or just chat.";
                } else if (clean.includes("?") || clean.length > 10) {
                    const brain = [
                        "That's a fascinating thought. I'm running a neural scan on that right now...",
                        "My internal nodes suggest that is a vital question for our current project.",
                        "Processing... I've found several ways we could approach that. Tell me more.",
                        "Interesting variable. I'm adding that to the tech index logic as we speak."
                    ];
                    response = brain[Math.floor(Math.random() * brain.length)];
                } else {
                    const count = loadGrid(clean);
                    response = count > 0 ? `I've filtered the 300 nodes for "${input}". You can see them below.` : "I'm not seeing a direct node for that, but I can definitely help you figure it out.";
                }

                log.innerHTML += `<div class="bubble ai"><b>[GEMINI_CORE]</b> ${response}</div>`;
                log.scrollTop = log.scrollHeight;
            }, 600);
        }
    }

    loadGrid();
</script>
</body>
</html>
