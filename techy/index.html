<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JDT // NEURAL_MONOLITH_v14</title>
    <style>
        :root { 
            --cyan: #00d2ff; 
            --bg: #000; 
            --panel: #050505; 
            --border: #1a1a1a; 
            --font: 'Courier New', monospace; 
            --dim: #333;
            --user-msg: #0a0a0a;
        }

        * { box-sizing: border-box; outline: none; cursor: crosshair; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--cyan); }

        body { 
            margin: 0; 
            background: var(--bg); 
            color: #fff; 
            font-family: var(--font); 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* --- SIDEBAR: SYSTEM DIAGNOSTICS & LOGS --- */
        #sidebar { 
            width: 350px; 
            background: var(--panel); 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            z-index: 100; 
            transition: transform 0.3s ease;
        }

        .sb-header { 
            padding: 40px 25px; 
            font-size: 0.9rem; 
            color: #444; 
            letter-spacing: 8px; 
            border-bottom: 1px solid var(--border); 
            font-weight: 900; 
            text-align: center;
        }

        .diag-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 1px; 
            background: var(--border); 
            border-bottom: 1px solid var(--border);
        }

        .diag-item { 
            background: #020202; 
            padding: 15px; 
            font-size: 0.6rem; 
            color: #444; 
        }

        .diag-item span { 
            display: block; 
            color: var(--cyan); 
            font-weight: bold; 
            margin-top: 5px; 
            font-size: 0.7rem;
        }

        #history-box { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 20px; 
            background: #010101;
        }

        .log-entry { 
            padding: 15px; 
            margin-bottom: 12px; 
            background: #000; 
            border: 1px solid #111; 
            position: relative;
            transition: 0.3s;
        }

        .log-entry:hover { 
            border-color: var(--cyan); 
            background: #050505; 
            transform: translateX(5px);
        }

        .log-id { font-size: 0.5rem; color: var(--dim); margin-bottom: 5px; }
        .log-preview { font-size: 0.65rem; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .sys-btn { 
            margin: 20px; 
            padding: 15px; 
            background: none; 
            border: 1px solid #222; 
            color: #444; 
            font-family: inherit; 
            font-size: 0.6rem; 
            letter-spacing: 3px; 
            transition: 0.3s;
        }

        .sys-btn:hover { border-color: var(--cyan); color: var(--cyan); background: rgba(0,210,255,0.05); }

        /* --- MAIN VIEWPORT --- */
        #viewport { 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            background: radial-gradient(circle at top right, #0a0a0a 0%, #000 100%); 
            position: relative; 
        }

        .top-nav { 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            gap: 25px; 
            padding: 20px; 
            border-bottom: 1px solid var(--border); 
            background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(20px); 
            z-index: 50; 
        }

        .nav-link { 
            color: #333; 
            text-decoration: none; 
            font-size: 0.7rem; 
            letter-spacing: 4px; 
            font-weight: bold; 
            transition: 0.3s;
        }

        .nav-link:hover, .active { color: var(--cyan); text-shadow: 0 0 10px var(--cyan); }

        /* --- CHAT AREA --- */
        #chat-flow { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 60px 15%; 
            display: flex; 
            flex-direction: column; 
            gap: 50px; 
        }

        .msg { max-width: 100%; position: relative; line-height: 2; animation: emerge 0.5s ease; }
        @keyframes emerge { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .user-block { 
            align-self: flex-end; 
            background: var(--user-msg); 
            padding: 25px; 
            border: 1px solid #1a1a1a; 
            border-radius: 15px 15px 0 15px; 
            max-width: 80%; 
            font-size: 0.95rem; 
            box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
        }

        .ai-block { 
            align-self: flex-start; 
            border-left: 3px solid var(--cyan); 
            padding-left: 40px; 
            font-size: 1.1rem; 
            color: #ddd; 
            width: 100%;
        }

        .label { font-size: 0.6rem; letter-spacing: 6px; margin-bottom: 15px; display: block; font-weight: 900; color: #222; }
        .ai-label { color: var(--cyan); text-shadow: 0 0 10px rgba(0,210,255,0.2); }

        /* --- THINKING / REASONING --- */
        #reasoning-bar { 
            display: none; 
            padding: 0 15%; 
            font-size: 0.65rem; 
            color: #1a1a1a; 
            letter-spacing: 5px; 
            margin-bottom: 20px; 
            font-weight: 900; 
            text-transform: uppercase;
        }

        /* --- INPUT SECTOR --- */
        .input-sector { 
            padding: 50px 15%; 
            background: linear-gradient(0deg, #000 70%, transparent); 
        }

        .input-wrap { 
            position: relative; 
            max-width: 1100px; 
            margin: 0 auto; 
        }

        #prompt { 
            width: 100%; 
            background: #080808; 
            border: 1px solid #1a1a1a; 
            padding: 30px; 
            color: #fff; 
            font-family: var(--font); 
            font-size: 1.1rem; 
            border-radius: 4px; 
            padding-right: 120px; 
            transition: 0.4s;
        }

        #prompt:focus { border-color: var(--cyan); background: #0c0c0c; box-shadow: 0 0 50px rgba(0,210,255,0.05); }

        #send-btn { 
            position: absolute; 
            right: 30px; 
            top: 50%; 
            transform: translateY(-50%); 
            background: none; 
            border: none; 
            color: var(--cyan); 
            cursor: pointer; 
            font-weight: 900; 
            letter-spacing: 4px; 
            font-size: 0.9rem; 
        }

        .cursor { 
            display: inline-block; 
            width: 12px; 
            height: 1.2em; 
            background: var(--cyan); 
            vertical-align: middle; 
            margin-left: 10px; 
            animation: blink 0.8s infinite; 
        }
        @keyframes blink { 50% { opacity: 0; } }

    </style>
</head>
<body>

    <aside id="sidebar">
        <div class="sb-header">JDT_NEURAL_MONOLITH</div>
        
        <div class="diag-grid">
            <div class="diag-item">CORE_TEMP<span id="stat-temp">32°C</span></div>
            <div class="diag-item">FUZZY_LOGIC<span id="stat-fuzzy">ACTIVE</span></div>
            <div class="diag-item">SYNC_RATE<span id="stat-sync">98.2%</span></div>
            <div class="diag-item">LATENCY<span id="stat-lat">4ms</span></div>
        </div>

        <div id="history-box"></div>
        
        <button class="sys-btn" onclick="clearSystemMemory()">WIPE_CORE_MEMORY</button>
    </aside>

    <main id="viewport">
        <nav class="top-nav">
            <a href="index.html" class="nav-link">HOME</a>
            <a href="dictionary.html" class="nav-link">DICTIONARY</a>
            <a href="hardware.html" class="nav-link">HARDWARE</a>
            <a href="software.html" class="nav-link">SOFTWARE</a>
            <a href="ai.html" class="nav-link active">TECHY_AI</a>
            <a href="tutorials.html" class="nav-link">TUTORIALS</a>
        </nav>

        <div id="chat-flow"></div>

        <div id="reasoning-bar">Initializing Recursive Logic...</div>

        <div class="input-sector">
            <div class="input-wrap">
                <input type="text" id="prompt" placeholder="AWAITING COMMAND..." autocomplete="off">
                <button id="send-btn" onclick="executeProcess()">EXECUTE</button>
            </div>
        </div>
    </main>

    <script>
        /* JDT // OMNI-ENGINE SCRIPT
           LINES OF CODE: 300+ 
           FEATURES: TYPO RECOGNITION, DYNAMIC REASONING, PERSISTENT LOGS
        */

        const chatFlow = document.getElementById('chat-flow');
        const promptInput = document.getElementById('prompt');
        const reasoning = document.getElementById('reasoning-bar');
        const historyBox = document.getElementById('history-box');

        let processing = false;
        let memory = JSON.parse(localStorage.getItem('jdt_monolith_v14')) || [];

        // --- THE UNIVERSAL BRAIN (HUGE KEYWORD MAP FOR TYPOS) ---
        const NEURAL_NETWORK = {
            HARDWARE: ["FIX", "FX", "REPAIR", "SCREEN", "BATTERY", "BOARD", "SCRN", "BTRY", "VOLTAGE", "IPHONE", "SOLDER"],
            SOFTWARE: ["CODE", "CDE", "PROGRAM", "SCRIPT", "HTML", "JS", "PYTHON", "CSS", "DEV", "ROOT", "FIRMWARE"],
            MATH: ["SOLVE", "CALC", "CALCULATE", "MATH", "MTH", "ALGEBRA", "X=", "EQUATION", "CALCULUS"],
            SYSTEM: ["HELP", "INFO", "STATUS", "WHO", "WHAT", "CAN", "HOW", "WHY"]
        };

        function executeProcess() {
            if (processing || !promptInput.value.trim()) return;
            const inputVal = promptInput.value.trim();
            
            appendMessage('OPERATOR', inputVal, 'user-block');
            promptInput.value = '';

            // Update UI Diagnostics
            updateDiagnostics();
            
            // Phase 1: Reasoning
            reasoning.style.display = 'block';
            reasoning.innerText = "[DECODING_INTENT_NODES...]";
            chatFlow.scrollTop = chatFlow.scrollHeight;

            setTimeout(() => {
                reasoning.innerText = "[SYNTHESIZING_OMNI_RESPONSE...]";
                setTimeout(() => {
                    reasoning.style.display = 'none';
                    const response = calculateLogic(inputVal);
                    appendMessage('TECHY_AI', response, 'ai-block', true);
                    storeLog(inputVal);
                }, 1200);
            }, 800);
        }

        // --- THE "ANSWER ANYTHING" TYPO-PROOF LOGIC ---
        function calculateLogic(input) {
            const up = input.toUpperCase();
            const tokens = up.split(/\W+/); // Split by non-word chars to handle weird spacing
            
            let primaryDomain = "GENERAL";

            // Fuzzy Scanning: Checks if any token is a 70% match for a brain keyword
            for (let token of tokens) {
                for (let domain in NEURAL_NETWORK) {
                    if (NEURAL_NETWORK[domain].some(key => isFuzzyMatch(token, key))) {
                        primaryDomain = domain;
                        break;
                    }
                }
            }

            // Generate Content based on identified Domain
            switch(primaryDomain) {
                case "HARDWARE":
                    return `HARDWARE_CORE ANALYSIS: Regarding "${up}". Initiate component-level diagnostic. Check VCC_MAIN power rails for shorts. If thermal anomalies are detected near the CPU, use high-grade IPA to isolate. JDT Protocol recommends verified schematics before physical extraction.`;
                
                case "SOFTWARE":
                    return `SOFTWARE_ENGINE ARCHITECTURE: Processing request for "${up}". Ensure all dependencies are mapped within a try-catch block. Use asynchronous handling for non-blocking UI rendering. LocalStorage persistence is recommended for user data retention.`;

                case "MATH":
                    return `COMPUTATIONAL RESULT: Analyzing algebraic parameters for "${up}". Isolate the unknown variable by performing inverse operations on both sides of the equation. Ensure order of operations (BODMAS/PEMDAS) is maintained for accurate integer resolution.`;

                case "SYSTEM":
                    return `SYSTEM_GUIDE: I am the JDT Omni-Core. I can process hardware schematics, software development, and complex mathematical theorems. Type any query to receive a technical deconstruction or use /ROOT for admin commands.`;

                default:
                    return `UNIVERSAL_SYNTHESIS: Your query regarding "${input.toUpperCase()}" has been analyzed. This aligns with JDT general archives. Recommendation: Define the core objective, isolate variables, and execute via systematic optimization phases.`;
            }
        }

        // --- TYPO RECOGNITION ALGORITHM (Levenshtein Lite) ---
        function isFuzzyMatch(s1, s2) {
            if (s1 === s2) return true;
            if (Math.abs(s1.length - s2.length) > 2) return false;
            
            let matches = 0;
            for (let char of s1) {
                if (s2.includes(char)) matches++;
            }
            return (matches / s2.length) > 0.65; // 65% match threshold for typos
        }

        function appendMessage(sender, text, className, stream = false) {
            const wrap = document.createElement('div');
            wrap.className = `msg ${className}`;
            const label = document.createElement('span');
            label.className = `label ${sender === 'TECHY_AI' ? 'ai-label' : ''}`;
            label.innerText = sender;
            const content = document.createElement('div');
            wrap.appendChild(label);
            wrap.appendChild(content);
            chatFlow.appendChild(wrap);
            chatFlow.scrollTop = chatFlow.scrollHeight;

            if (stream) {
                typeEffect(content, text);
            } else {
                content.innerText = text;
            }
        }

        function typeEffect(element, text) {
            processing = true;
            let i = 0;
            element.innerHTML = '<span class="cursor"></span>';
            
            function step() {
                if (i < text.length) {
                    element.innerHTML = text.substring(0, i + 1) + '<span class="cursor"></span>';
                    i++;
                    chatFlow.scrollTop = chatFlow.scrollHeight;
                    setTimeout(step, 12); // High-speed token generation
                } else {
                    element.innerHTML = text;
                    processing = false;
                }
            }
            step();
        }

        function updateDiagnostics() {
            document.getElementById('stat-temp').innerText = Math.floor(Math.random() * 5 + 30) + "°C";
            document.getElementById('stat-lat').innerText = Math.floor(Math.random() * 10 + 2) + "ms";
            document.getElementById('stat-sync').innerText = (Math.random() * 2 + 97).toFixed(1) + "%";
        }

        function storeLog(txt) {
            const log = { id: Date.now().toString().slice(-6), time: new Date().toLocaleTimeString(), val: txt };
            memory.unshift(log);
            if(memory.length > 25) memory.pop();
            localStorage.setItem('jdt_monolith_v14', JSON.stringify(memory));
            renderSidebar();
        }

        function renderSidebar() {
            historyBox.innerHTML = memory.map(m => `
                <div class="log-entry" onclick="reloadSession()">
                    <div class="log-id">SESSION_ID: ${m.id} // ${m.time}</div>
                    <div class="log-preview">${m.val.toUpperCase()}</div>
                </div>
            `).join('');
        }

        function reloadSession() {
            chatFlow.innerHTML = '';
            appendMessage('TECHY_AI', 'RESTORING_NEURAL_STATE... CACHE_LOAD_COMPLETE.', 'ai-block', true);
        }

        function clearSystemMemory() {
            localStorage.clear();
            location.reload();
        }

        promptInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') executeProcess(); });
        
        window.onload = () => {
            appendMessage('TECHY_AI', 'NEURAL_MONOLITH_v14 ONLINE. FUZZY_LOGIC_V3 ACTIVE. AWAITING OPERATOR INPUT.', 'ai-block', true);
            renderSidebar();
        };
    </script>
</body>
</html>
