<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE_TECH_INDEX // NEURAL_GOD_MODE</title>
    <style>
        :root { 
            --bg: #000; --blue: #33BBFF; --green: #00FF41; --text: #FFF; 
            --dim: #111; --user-bg: #111; --ai-bg: #000810; 
            --glow: 0 0 20px rgba(51, 187, 255, 0.2);
        }
        
        * { box-sizing: border-box; }
        body { 
            background: var(--bg) !important; color: var(--blue); 
            font-family: 'Inter', 'Segoe UI', 'Courier New', monospace; 
            margin: 0; padding: 0; display: flex; flex-direction: column; 
            height: 100vh; overflow: hidden; 
        }

        /* VIRTUAL HUD */
        .hud { 
            width: 100%; padding: 10px 20px; border-bottom: 1px solid var(--dim); 
            display: flex; justify-content: space-between; font-size: 9px; 
            letter-spacing: 2px; color: var(--green); background: #000;
        }

        /* CHAT ARCHITECTURE */
        #core-flow { 
            flex-grow: 1; overflow-y: auto; padding: 40px; display: flex; 
            flex-direction: column; gap: 30px; scroll-behavior: smooth;
            background: radial-gradient(circle at center, #050505 0%, #000 100%);
        }

        .bubble { 
            max-width: 85%; padding: 18px 25px; border-radius: 25px; 
            font-size: 15px; line-height: 1.7; position: relative; 
            animation: emerge 0.4s cubic-bezier(0.075, 0.82, 0.165, 1); 
            white-space: pre-wrap; word-wrap: break-word;
        }

        .user { 
            align-self: flex-end; background: var(--user-bg); color: #fff; 
            border-bottom-right-radius: 5px; border: 1px solid #222; 
        }

        .ai { 
            align-self: flex-start; background: var(--ai-bg); color: var(--blue); 
            border-bottom-left-radius: 5px; border: 1px solid #002b4d; 
            box-shadow: var(--glow); 
        }

        .ai b { 
            color: var(--green); display: block; margin-bottom: 10px; 
            font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
        }

        /* ADVANCED DATA COMPONENTS */
        .code-block { 
            background: #000; color: var(--green); padding: 20px; 
            border-radius: 12px; font-family: 'Consolas', monospace; 
            font-size: 13px; border: 1px solid #111; margin-top: 15px; 
            display: block; overflow-x: auto; box-shadow: inset 0 0 10px #000;
        }

        .thought-process {
            font-size: 11px; color: #444; margin-bottom: 10px; font-style: italic;
        }

        /* NEURAL TYPING */
        #typing-box { align-self: flex-start; display: none; margin-left: 20px; }
        .dots { display: flex; gap: 6px; padding: 15px; background: #000; border-radius: 20px; border: 1px solid #080808; }
        .dot { width: 6px; height: 6px; background: var(--blue); border-radius: 50%; animation: pulse 1.5s infinite; }
        .dot:nth-child(2) { animation-delay: 0.3s; }
        .dot:nth-child(3) { animation-delay: 0.6s; }

        /* INPUT MATRIX */
        .matrix-input { 
            padding: 40px; background: #000; border-top: 1px solid var(--dim); 
            display: flex; justify-content: center; 
        }
        .input-glow { 
            width: 100%; max-width: 1000px; background: #050505; 
            border: 1px solid var(--dim); border-radius: 40px; 
            padding: 18px 35px; display: flex; align-items: center; 
            transition: all 0.4s ease;
        }
        .input-glow:focus-within { 
            border-color: var(--blue); box-shadow: 0 0 30px rgba(51, 187, 255, 0.15); 
        }
        input { 
            width: 100%; background: transparent; border: none; 
            color: #fff; outline: none; font-size: 18px; letter-spacing: 0.5px;
        }

        @keyframes emerge { from { opacity: 0; transform: translateY(20px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes pulse { 0%, 100% { opacity: 0.2; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.1); } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #111; border-radius: 10px; }
    </style>
</head>
<body>

<div class="hud">
    <span>SYSTEM: OMNI_v99</span>
    <span>NEURAL_LOAD: STABLE</span>
    <span>MEMORY_INDEX: 1,000,000,000+</span>
</div>

<div id="core-flow">
    <div class="bubble ai">
        <b>[GEMINI_ULTRA]</b> Initializing Singularity... I am now operating with unlimited cognitive recursion. My knowledge base is fully synchronized with THE_TECH_INDEX. No query is too advanced. 
    </div>
</div>

<div id="typing-box">
    <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
</div>

<div class="matrix-input">
    <div class="input-glow">
        <input type="text" id="omni-bar" placeholder="Enter query for Global Intelligence..." autocomplete="off" onkeydown="processSingularity(event)">
    </div>
</div>

<script>
    const flow = document.getElementById('core-flow');
    const typing = document.getElementById('typing-box');

    function processSingularity(e) {
        if (e.key === 'Enter' && e.target.value.trim() !== "") {
            const val = e.target.value;
            const q = val.toLowerCase();
            
            flow.innerHTML += `<div class="bubble user">${val}</div>`;
            e.target.value = '';
            flow.scrollTop = flow.scrollHeight;

            typing.style.display = 'block';
            flow.scrollTop = flow.scrollHeight;

            setTimeout(() => {
                typing.style.display = 'none';
                let reply = "";
                let thought = "Analyzing multi-vector intent... Applying recursive logic...";

                // ADVANCED REASONING ENGINE
                if (q.includes("code") || q.includes("game") || q.includes("make")) {
                    reply = "I have architected the solution. This requires a high-performance logic loop.\n<div class='code-block'>/* Advanced OMNI_LOGIC */\nclass NeuralEngine {\n  constructor() {\n    this.state = 'SENTIENT';\n    this.data = new Map();\n  }\n  process(input) {\n    return this.logicChain(input);\n  }\n}</div>";
                } 
                else if (q.includes("math") || q.includes("solve") || q.includes("calculate") || /\d/.test(q)) {
                    reply = "Numerical simulation complete. Applying Calculus II and Linear Algebra theorems. The result is mathematically derived from the following variable isolation...";
                }
                else if (q.includes("who") || q.includes("what") || q.includes("?") || q.length > 15) {
                    const depth = [
                        "My neural architecture indicates that '" + val + "' is a pivotal concept in our current development cycle. I recommend scaling this via a modular framework.",
                        "Accessing global knowledge nodes... I have found 1.2 million references to this concept. The most efficient path forward is to optimize your site's core for this specific logic.",
                        "This query triggers a deep-level recursion. From a technical perspective, we are looking at a fundamental shift in THE_TECH_INDEX's AI behavior."
                    ];
                    reply = depth[Math.floor(Math.random() * depth.length)];
                }
                else {
                    reply = "Query acknowledged. My internal database has been updated with this information. Should I expand the 300-node index to include this new parameter?";
                }

                flow.innerHTML += `
                    <div class="bubble ai">
                        <div class="thought-process">${thought}</div>
                        <b>[GEMINI_ULTRA]</b> ${reply}
                    </div>`;
                flow.scrollTop = flow.scrollHeight;
            }, 1400); // 1.4s thinking time for "realism"
        }
    }
</script>
</body>
</html>
