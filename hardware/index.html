<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J&D TECH // HARDWARE_ENG</title>
    <style>
        :root { --bg: #020202; --panel: #080808; --cyan: #00d2ff; --border: #151515; --mono: 'Courier New', monospace; }
        body { background: var(--bg); color: #eee; font-family: var(--mono); margin: 0; padding: 20px; }
        
        nav { display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 30px; }
        .back { color: #444; text-decoration: none; font-size: 0.7rem; }
        .back:hover { color: var(--cyan); }

        h2 { color: var(--cyan); font-size: 0.9rem; border-left: 3px solid var(--cyan); padding-left: 10px; margin: 40px 0 20px; text-transform: uppercase; letter-spacing: 2px; }

        /* SECTION 1: PC BUILDER WITH PRICES */
        .pc-builder { background: var(--panel); border: 1px solid var(--border); padding: 20px; margin-bottom: 50px; }
        .comp-row { display: grid; grid-template-columns: 150px 1fr 200px 100px; gap: 15px; padding: 15px 0; border-bottom: 1px solid #111; align-items: center; }
        .comp-label { color: var(--cyan); font-size: 0.7rem; font-weight: 900; }
        .comp-desc { color: #555; font-size: 0.6rem; }
        select { background: #000; border: 1px solid #333; color: #fff; font-family: var(--mono); font-size: 0.7rem; padding: 5px; outline: none; width: 100%; }
        .price-tag { color: #00ff41; font-size: 0.7rem; text-align: right; }
        .total-box { text-align: right; padding: 20px; font-size: 1.2rem; color: var(--cyan); border-top: 2px solid var(--border); margin-top: 10px; }

        /* SECTION 2: CUSTOM PHONE CASE BUILDER */
        .case-builder-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; background: var(--panel); border: 1px solid var(--border); padding: 30px; }
        .case-preview-area { display: flex; justify-content: center; align-items: center; background: #000; height: 400px; border: 1px dashed #222; position: relative; }
        
        /* The Visual Case */
        #case-visual { 
            width: 160px; height: 320px; border-radius: 25px; 
            border: 8px solid #1a1a1a; transition: 0.5s; position: relative;
            background-color: #333; box-shadow: 0 0 30px rgba(0,0,0,1);
        }
        .camera-bump { position: absolute; top: 20px; left: 20px; width: 60px; height: 60px; background: #111; border-radius: 10px; }
        
        .controls { display: flex; flex-direction: column; gap: 20px; }
        .control-group label { display: block; color: #666; font-size: 0.6rem; margin-bottom: 8px; text-transform: uppercase; }
        .color-btn { width: 30px; height: 30px; border: 1px solid #fff; cursor: pointer; display: inline-block; margin-right: 5px; }

    </style>
</head>
<body>
    <nav>
        <span style="color:var(--cyan)">// HARDWARE_ENGINEERING_DEPT</span>
        <a href="../" class="back">[ EXIT_TO_HUB ]</a>
    </nav>

    <h2>1. PC_STATION_CONFIGURATOR</h2>
    <div class="pc-builder">
        <div class="comp-row">
            <div class="comp-label">CPU</div>
            <div class="comp-desc">Logic processing unit.</div>
            <select id="cpu" onchange="calcTotal()">
                <option value="599">i9-14900K - $599</option>
                <option value="449">i7-14700K - $449</option>
                <option value="699">Ryzen 9 7950X - $699</option>
            </select>
            <div class="price-tag">UNIT_LOCK</div>
        </div>

        <div class="comp-row">
            <div class="comp-label">GPU</div>
            <div class="comp-desc">Neural/Vector graphics.</div>
            <select id="gpu" onchange="calcTotal()">
                <option value="1599">RTX 4090 - $1,599</option>
                <option value="999">RTX 4080 Super - $999</option>
                <option value="799">RTX 4070 Ti - $799</option>
            </select>
            <div class="price-tag">UNIT_LOCK</div>
        </div>

        <div class="total-box">
            ESTIMATED_BUILD_COST: $<span id="total-price">2198</span>
        </div>
    </div>

    <h2>2. CUSTOM_CASE_FABRICATOR</h2>
    <div class="case-builder-grid">
        <div class="case-preview-area">
            <div id="case-visual">
                <div class="camera-bump"></div>
                <div style="position:absolute; bottom:20px; width:100; text-align:center; font-size:0.4rem; color:rgba(255,255,255,0.2); width:100%;">J&D_PROTOTYPE</div>
            </div>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>Case Material Color</label>
                <div class="color-btn" style="background: #00d2ff;" onclick="updateCase('#00d2ff')"></div>
                <div class="color-btn" style="background: #ff004c;" onclick="updateCase('#ff004c')"></div>
                <div class="color-btn" style="background: #ffffff;" onclick="updateCase('#ffffff')"></div>
                <div class="color-btn" style="background: #1a1a1a;" onclick="updateCase('#1a1a1a')"></div>
            </div>

            <div class="control-group">
                <label>Texture Finish</label>
                <select id="finish" onchange="updateFinish()">
                    <option value="1">MATTE_INDUSTRIAL</option>
                    <option value="0.5">GLOSS_CARBON</option>
                    <option value="0.2">METALLIC_CORE</option>
                </select>
            </div>

            <div style="font-size: 0.6rem; color: #444; border-top: 1px solid #111; padding-top: 15px;">
                FABRICATION_
