<!DOCTYPE html>
<html>
<head>
    <title>Techy AI</title>
    <style>
        body { background-color: #0a0a0a; color: #00FF88; font-family: monospace; margin: 0; padding: 20px; }
        nav { margin-bottom: 50px; border-bottom: 1px solid #33BBFF; padding: 10px; text-align: center; }
        nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; }
        .chat-box { border: 1px solid #33BBFF; height: 300px; padding: 10px; overflow-y: scroll; margin-bottom: 10px; }
        input { width: 90%; background: #111; border: 1px solid #00FF88; color: #00FF88; padding: 10px; outline: none; }
        .bot { color: #33BBFF; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="hardware.html">Hardware</a>
        <a href="software.html">Software</a>
        <a href="dictionary.html">Dictionary</a>
        <a href="techy.html">Techy AI</a>
    </nav>

    <h2>TECHY AI v2.2</h2>
    <div class="chat-box" id="logs">
        <div class="bot">>> System Ready. Ask about Jett, Daniel, or Services.</div>
    </div>
    <input type="text" id="in" placeholder="Type here..." onkeypress="if(event.key==='Enter') chat()">

    <script>
        function chat() {
            var i = document.getElementById('in');
            var l = document.getElementById('logs');
            var v = i.value.toLowerCase();
            if(!v) return;

            l.innerHTML += "<div>> " + i.value + "</div>";
            var r = "I am still learning. Try asking for Jett or Daniel.";
            
            if(v.includes("jett")) r = "Jett handles the Software and Web Design side of the business.";
            if(v.includes("daniel")) r = "Daniel is the Hardware expert for PC builds and repairs.";
            if(v.includes("hi") || v.includes("hello")) r = "Hello! System is online.";

            setTimeout(function() {
                l.innerHTML += "<div class='bot'>>> " + r + "</div>";
                l.scrollTop = l.scrollHeight;
            }, 200);
            i.value = "";
        }
    </script>
</body>
</html>
