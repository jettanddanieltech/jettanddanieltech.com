<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TECH_INDEX // JDT_SYSTEM</title>
    <style>
        :root { --cyan: #00d2ff; --bg: #000; --panel: #0a0a0a; --border: #1a1a1a; --font: 'Courier New', monospace; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: var(--font); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        header { text-align: center; padding: 80px 20px 40px 20px; border-bottom: 2px solid #111; }
        header h1 { font-size: 3.5rem; letter-spacing: 12px; margin: 0; font-weight: 900; text-transform: uppercase; }
        header p { color: var(--cyan); letter-spacing: 6px; font-size: 0.8rem; margin-top: 15px; text-transform: uppercase; }
        main { flex-grow: 1; overflow-y: auto; padding: 30px 20px; max-width: 550px; margin: 0 auto; width: 100%; }
        .row { display: flex; align-items: center; padding: 25px; background: var(--panel); border: 1px solid var(--border); margin-bottom: 15px; cursor: pointer; text-decoration: none; color: inherit; transition: 0.2s; }
        .row:active { border-color: var(--cyan); background: #111; }
        .row::before { content: ">"; margin-right: 25px; color: #444; font-weight: bold; }
        .icon { width: 22px; height: 16px; background: #333; margin-right: 25px; border-radius: 1px; }
        .label { font-size: 1.1rem; letter-spacing: 4px; font-weight: 600; text-transform: uppercase; opacity: 0.8; }
        footer { padding: 40px; text-align: center; color: #333; font-size: 0.7rem; letter-spacing: 4px; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <h1>TECH_INDEX</h1>
        <p>DIRECTORY ACCESS</p>
    </header>
    <main>
        <a href="dictionary.html" class="row"><div class="icon"></div><div class="label">DICTIONARY</div></a>
        <a href="hardware.html" class="row"><div class="icon"></div><div class="label">HARDWARE</div></a>
        <a href="software.html" class="row"><div class="icon"></div><div class="label">SOFTWARE</div></a>
        <a href="ai.html" class="row"><div class="icon"></div><div class="label">TECHY AI</div></a>
        <a href="tutorials.html" class="row"><div class="icon"></div><div class="label">TUTORIALS</div></a>
    </main>
    <footer>SYSTEM STATUS: ONLINE // ROOT ACCESS GRANTED</footer>
</body>
</html>
